server:
  port: 8080

spring:
  application:
    name: dupi-rag-api
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:dupi_rag}
    username: ${POSTGRES_USER:dupi}
    password: ${POSTGRES_PASSWORD:dupi123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

dupi:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:dupi-documents}
  recovery:
    bucket: ${DUPI_RECOVERY_BUCKET:dupi-recovery}
    quiescence-timeout-seconds: ${DUPI_RECOVERY_QUIESCENCE_TIMEOUT_SECONDS:300}
    page-size: ${DUPI_RECOVERY_PAGE_SIZE:500}
    max-concurrent-jobs: ${DUPI_RECOVERY_MAX_CONCURRENT_JOBS:2}
  milvus:
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    collection: ${MILVUS_COLLECTION:dupi_chunks}
  redis:
    ingest-queue: dupi:ingest:jobs
    cancel-channel: dupi:chat:cancel
    max-pending-jobs: ${INGEST_QUEUE_MAX_PENDING_JOBS:200}
    max-recovery-attempts: ${INGEST_RECOVERY_MAX_ATTEMPTS:3}
  ingest:
    recovery-cron: ${INGEST_RECOVERY_CRON:0 */2 * * * *}
    outbox-dispatch-cron: ${INGEST_OUTBOX_DISPATCH_CRON:*/10 * * * * *}
    notifications:
      webhook-url: ${INGEST_FAILURE_NOTIFICATION_WEBHOOK_URL:}
      webhook-secret: ${INGEST_FAILURE_NOTIFICATION_WEBHOOK_SECRET:}
      timeout-seconds: ${INGEST_FAILURE_NOTIFICATION_TIMEOUT_SECONDS:10}
      max-attempts: ${INGEST_FAILURE_NOTIFICATION_MAX_ATTEMPTS:5}
      max-error-message-length: ${INGEST_FAILURE_NOTIFICATION_MAX_ERROR_MESSAGE_LENGTH:512}
      allow-insecure-webhook: ${INGEST_FAILURE_NOTIFICATION_ALLOW_INSECURE_WEBHOOK:false}
      dispatch-cron: ${INGEST_FAILURE_NOTIFICATION_DISPATCH_CRON:*/30 * * * * *}
  llm:
    chat:
      base-url: ${CHAT_BASE_URL:${OPENAI_BASE_URL:https://api.deepseek.com}}
      api-key: ${CHAT_API_KEY:${OPENAI_API_KEY:}}
      model: ${CHAT_MODEL:${OPENAI_CHAT_MODEL:deepseek-chat}}
    embedding:
      base-url: ${EMBEDDING_BASE_URL:${OPENAI_BASE_URL:}}
      api-key: ${EMBEDDING_API_KEY:${OPENAI_API_KEY:}}
      model: ${EMBEDDING_MODEL:${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}}
      dimension: ${EMBEDDING_DIMENSION:${OPENAI_EMBEDDING_DIMENSION:1536}}
  rag:
    default-top-k: 5
    max-context-chars: 12000
  worker:
    base-url: ${WORKER_BASE_URL:http://localhost:8000}
  security:
    api-key: ${DUPI_API_KEY:}
    internal-key: ${DUPI_INTERNAL_KEY:}
    auth-secret: ${DUPI_AUTH_SECRET:}
    token-ttl-seconds: ${DUPI_AUTH_TOKEN_TTL_SECONDS:28800}
    login-max-failures: ${DUPI_AUTH_LOGIN_MAX_FAILURES:5}
    login-lockout-seconds: ${DUPI_AUTH_LOGIN_LOCKOUT_SECONDS:300}
  upload-rate-limit:
    enabled: ${UPLOAD_RATE_LIMIT_ENABLED:true}
    requests: ${UPLOAD_RATE_LIMIT_REQUESTS:20}
    window-seconds: ${UPLOAD_RATE_LIMIT_WINDOW_SECONDS:60}
  upload-quota:
    enabled: ${UPLOAD_QUOTA_ENABLED:true}
    retained-bytes-limit: ${UPLOAD_QUOTA_RETAINED_BYTES_LIMIT:1073741824}
    retained-documents-limit: ${UPLOAD_QUOTA_RETAINED_DOCUMENTS_LIMIT:1000}
    window-bytes-limit: ${UPLOAD_QUOTA_WINDOW_BYTES_LIMIT:268435456}
    window-seconds: ${UPLOAD_QUOTA_WINDOW_SECONDS:3600}
    attempt-lease-seconds: ${UPLOAD_QUOTA_ATTEMPT_LEASE_SECONDS:300}
    reconciliation-batch-size: ${UPLOAD_QUOTA_RECONCILIATION_BATCH_SIZE:50}
    reconciliation-cron: ${UPLOAD_QUOTA_RECONCILIATION_CRON:0 */5 * * * *}
  cleanup:
    orphan-vectors-cron: ${ORPHAN_VECTOR_CLEANUP_CRON:0 30 3 * * *}
  audit:
    retention-days: ${AUDIT_RETENTION_DAYS:180}
    retention-cron: ${AUDIT_RETENTION_CRON:0 15 2 * * *}
    alert-window-minutes: ${AUDIT_ALERT_WINDOW_MINUTES:30}
    alert-failed-threshold: ${AUDIT_ALERT_FAILED_THRESHOLD:10}
    alert-webhook-url: ${AUDIT_ALERT_WEBHOOK_URL:}
    alert-webhook-timeout-seconds: ${AUDIT_ALERT_WEBHOOK_TIMEOUT_SECONDS:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} trace=%X{traceId} - %msg%n"
