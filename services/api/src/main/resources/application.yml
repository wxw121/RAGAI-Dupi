server:
  port: 8080

spring:
  application:
    name: dupi-rag-api
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:dupi_rag}
    username: ${POSTGRES_USER:dupi}
    password: ${POSTGRES_PASSWORD:dupi123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

dupi:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:dupi-documents}
  milvus:
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    collection: ${MILVUS_COLLECTION:dupi_chunks}
  redis:
    ingest-queue: dupi:ingest:jobs
    cancel-channel: dupi:chat:cancel
  llm:
    chat:
      base-url: ${CHAT_BASE_URL:${OPENAI_BASE_URL:https://api.deepseek.com}}
      api-key: ${CHAT_API_KEY:${OPENAI_API_KEY:}}
      model: ${CHAT_MODEL:${OPENAI_CHAT_MODEL:deepseek-chat}}
    embedding:
      base-url: ${EMBEDDING_BASE_URL:${OPENAI_BASE_URL:}}
      api-key: ${EMBEDDING_API_KEY:${OPENAI_API_KEY:}}
      model: ${EMBEDDING_MODEL:${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}}
      dimension: ${EMBEDDING_DIMENSION:${OPENAI_EMBEDDING_DIMENSION:1536}}
  rag:
    default-top-k: 5
    max-context-chars: 12000
  worker:
    base-url: ${WORKER_BASE_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} trace=%X{traceId} - %msg%n"
