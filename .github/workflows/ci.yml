name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "dev/**"

permissions:
  contents: read

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Verify API
        run: |
          chmod +x mvnw
          ./mvnw verify

  worker:
    name: Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/worker
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/worker/requirements-dev.txt
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
      - name: Test Worker
        run: python -m pytest -q

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test Web
        run: npm test
      - name: Build Web
        run: npm run build

  release-scripts:
    name: Release scripts
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Pester
        shell: powershell
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 3.4.0 -Force -Scope CurrentUser
      - name: Test release scripts
        shell: powershell
        run: |
          Import-Module Pester -RequiredVersion 3.4.0
          $result = Invoke-Pester scripts/tests -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }
      - name: Validate Docker Compose
        shell: powershell
        env:
          POSTGRES_PASSWORD: test
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test-secret
        run: docker compose -f deploy/docker-compose.yml config --quiet
