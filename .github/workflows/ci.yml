name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "dev/**"

permissions:
  contents: read

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Verify API
        run: |
          chmod +x mvnw
          ./mvnw verify

  worker:
    name: Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/worker
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/worker/requirements-dev.txt
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
      - name: Test Worker
        run: python -m pytest -q

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test Web
        run: npm test
      - name: Build Web
        run: npm run build

  release-scripts:
    name: Release scripts
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Test release scripts with Pester 4.10.1
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          $root = Join-Path $env:RUNNER_TEMP "pester-4.10.1"
          $package = Join-Path $root "pester.zip"
          $module = Join-Path $root "module"
          New-Item -ItemType Directory -Force $root | Out-Null
          Invoke-WebRequest "https://www.powershellgallery.com/api/v2/package/Pester/4.10.1" -OutFile $package
          Unblock-File $package
          Expand-Archive -Path $package -DestinationPath $module
          Get-ChildItem -Path $module -Recurse | Unblock-File
          $manifest = Join-Path $module "Pester.psd1"
          if (-not (Test-Path $manifest)) { throw "Pester manifest not found: $manifest" }
          Import-Module $manifest -Force
          Write-Host "Using Pester $((Get-Module Pester).Version) from $manifest"
          $ErrorActionPreference = "Continue"
          $result = Invoke-Pester scripts/tests -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }

  compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Validate Docker Compose
        env:
          POSTGRES_PASSWORD: test
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test-secret
        run: |
          cp deploy/.env.example deploy/.env
          docker compose -f deploy/docker-compose.yml config --quiet
