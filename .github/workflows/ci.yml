name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "dev/**"

permissions:
  contents: read

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Verify API
        run: |
          chmod +x mvnw
          ./mvnw verify

  worker:
    name: Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/worker
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/worker/requirements-dev.txt
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
      - name: Test Worker
        run: python -m pytest -q

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test Web
        run: npm test
      - name: Build Web
        run: npm run build

  release-scripts:
    name: Release scripts
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Prepare Pester 4.10.1
        shell: powershell
        run: |
          $root = Join-Path $env:RUNNER_TEMP "pester-4.10.1"
          $package = Join-Path $root "pester.zip"
          $module = Join-Path $root "module"
          New-Item -ItemType Directory -Force $root | Out-Null
          Invoke-WebRequest "https://www.powershellgallery.com/api/v2/package/Pester/4.10.1" -OutFile $package
          Expand-Archive -Path $package -DestinationPath $module
      - name: Test release scripts
        shell: powershell
        run: |
          $module = Join-Path $env:RUNNER_TEMP "pester-4.10.1\module\Pester.psd1"
          Import-Module $module -Force
          Write-Host "Using Pester $((Get-Module Pester).Version) from $module"
          $result = Invoke-Pester scripts/tests -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }
      - name: Validate Docker Compose
        shell: powershell
        env:
          POSTGRES_PASSWORD: test
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test-secret
        run: docker compose -f deploy/docker-compose.yml config --quiet
